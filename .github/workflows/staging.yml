name: Deploy to Staging

on:
  pull_request:
    branches: [main]

jobs:
  staging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
      
      - name: Install dependencies
        run: npm install
        working-directory: ./api
      
      - name: Run tests
        run: npm test
        working-directory: ./api
      
      - name: Build frontend
        run: npm run build
        working-directory: ./admin-pc
      
      - name: Deploy to staging server
        uses: easingthemes/ssh-deploy@v3
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.SERVER_HOST }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          SOURCE: ./
          TARGET: /root/.openclaw/workspace/projects/clearspring-v2-staging
          EXCLUDE: "/node_modules/, /.git/"
      
      - name: Restart staging service
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root/.openclaw/workspace/projects/clearspring-v2-staging/api
            npm install
            pm2 restart clearspring-api-staging

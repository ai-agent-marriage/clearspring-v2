global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.gmail.com:465'
  smtp_from: 'davisedwad82@gmail.com'
  smtp_auth_username: 'davisedwad82@gmail.com'
  smtp_auth_password: 'dghc wioj lggw bwpu'
  smtp_require_tls: true

# 模板文件
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# 路由配置
route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'feishu'
  
  # 子路由 - 根据严重程度分发
  routes:
    - match:
        severity: critical
      receiver: 'feishu-critical'
      continue: true
    
    - match:
        severity: warning
      receiver: 'feishu-warning'
    
    # 邮件通知（非工作时间）
    - match:
        send_email: 'true'
      receiver: 'email'

# 接收器配置
receivers:
  # 飞书机器人 - 一般告警
  - name: 'feishu'
    webhook_configs:
      - url: 'https://open.feishu.cn/open-apis/bot/v2/hook/3297ae19-077a-4b42-b827-cd56b5b82791'
        send_resolved: true
        max_alerts: 5
  
  # 飞书机器人 - 严重告警
  - name: 'feishu-critical'
    webhook_configs:
      - url: 'https://open.feishu.cn/open-apis/bot/v2/hook/3297ae19-077a-4b42-b827-cd56b5b82791'
        send_resolved: true
        max_alerts: 10
  
  # 飞书机器人 - 警告
  - name: 'feishu-warning'
    webhook_configs:
      - url: 'https://open.feishu.cn/open-apis/bot/v2/hook/3297ae19-077a-4b42-b827-cd56b5b82791'
        send_resolved: true
  
  # 邮件通知（Gmail）
  - name: 'email'
    email_configs:
      - to: 'davisedwad82@gmail.com'
        from: 'davisedwad82@gmail.com'
        send_resolved: true
        html: '{{ template "email.html" . }}'
  
  # PagerDuty（可选）
  - name: 'pagerduty'
    pagerduty_configs:
      - service_key: 'YOUR_PAGERDUTY_SERVICE_KEY'
        send_resolved: true

# 抑制规则（避免告警风暴）
inhibit_rules:
  # 如果存在 critical 告警，抑制同 alertname 的 warning 告警
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']
  
  # 如果服务宕机，抑制其他相关告警
  - source_match:
      alertname: 'ServiceDown'
    target_match_re:
      alertname: '.*'
    equal: ['instance']

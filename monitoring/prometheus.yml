global:
  scrape_interval: 15s
  evaluation_interval: 15s

  # 外部标签
  external_labels:
    monitor: 'clearspring-monitor'
    environment: 'production'

# 告警管理器配置
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - localhost:9093

# 规则文件
rule_files:
  - "alert-rules.yml"

# 抓取配置
scrape_configs:
  # Prometheus 自身监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
  
  # Node Exporter - 服务器资源监控
  - job_name: 'node_exporter'
    static_configs:
      - targets: ['localhost:9100']
  
  # ClearSpring API 应用监控
  - job_name: 'clearspring-api'
    static_configs:
      - targets: ['localhost:3000']
    metrics_path: '/metrics'
  
  # PM2 监控 (需要安装 pm2-prometheus-exporter)
  - job_name: 'pm2'
    static_configs:
      - targets: ['localhost:9616']
